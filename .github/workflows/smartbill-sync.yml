name: SmartBill Daily Sync

on:
  schedule:
    # Rulează zilnic la 06:00 UTC (08:00 ora Romaniei)
    - cron: "0 6 * * *"
  # Permite si rulare manuala din GitHub UI
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright psycopg2-binary
          playwright install chromium --with-deps

      - name: Run SmartBill export & import
        env:
          SMARTBILL_EMAIL: ${{ secrets.SMARTBILL_EMAIL }}
          SMARTBILL_PASSWORD: ${{ secrets.SMARTBILL_PASSWORD }}
          DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
          HEADLESS: "true"
        run: python scripts/smartbill_export.py

      - name: Upload screenshots (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smartbill-screenshots-${{ github.run_id }}
          path: screenshots/
          retention-days: 7
